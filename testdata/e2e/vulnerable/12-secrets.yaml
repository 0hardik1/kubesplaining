# Slot #12 (PLAN.md:67-71) — secrets bundle e2e fixtures.
#
# This file provides one fixture per new rule:
#   - KUBE-SECRETS-STALE-001       Secret unreferenced by any pod / SA
#   - KUBE-SECRETS-CROSSNS-001     workload SA can read secrets in another ns
#   - KUBE-SECRETS-TLS-EXPIRY-001  cert-manager-annotated TLS secret near expiry
#   - KUBE-CONFIGMAP-CREDS-001     ConfigMap with high-confidence credential keys
#
# We deliberately use a dedicated namespace (`secrets-bundle`) so the assertions
# don't interfere with the baseline fixture's `vulnerable` namespace, and so
# the standard exclusions preset (which excludes kube-system) doesn't drop
# our findings.
apiVersion: v1
kind: Namespace
metadata:
  name: secrets-bundle
---
# Cross-namespace target: this namespace holds the Secret the workload SA in
# `secrets-bundle` is granted to read via the cross-ns RoleBinding below.
apiVersion: v1
kind: Namespace
metadata:
  name: secrets-bundle-target
---
# Stale-secret fixture: opaque Secret that no Pod or SA references. Type is
# Opaque (not service-account-token) so the analyzer's stale check applies.
apiVersion: v1
kind: Secret
metadata:
  name: stale-creds
  namespace: secrets-bundle
type: Opaque
stringData:
  unused: placeholder
---
# Cross-namespace fixture: a Role + RoleBinding in `secrets-bundle-target`
# that grants the workload SA in `secrets-bundle` the ability to read Secrets
# there. The KUBE-SECRETS-CROSSNS-001 rule fires because the SA's workload
# runs in `secrets-bundle` while the grant is for `secrets-bundle-target`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cross-ns-reader
  namespace: secrets-bundle
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secrets-reader
  namespace: secrets-bundle-target
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cross-ns-secrets-read
  namespace: secrets-bundle-target
subjects:
  - kind: ServiceAccount
    name: cross-ns-reader
    namespace: secrets-bundle
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secrets-reader
---
# A workload to mount the cross-ns SA so it shows up in the analyzer's
# workload-namespace map. Use pause as the image to keep the pod tiny and
# always-ready (no application logic, no mounts beyond the SA token).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cross-ns-consumer
  namespace: secrets-bundle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cross-ns-consumer
  template:
    metadata:
      labels:
        app: cross-ns-consumer
    spec:
      serviceAccountName: cross-ns-reader
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
---
# TLS-expiry fixture: a TLS Secret with a cert-manager annotation that
# reports a NotAfter timestamp comfortably in the past, so the analyzer's
# "already expired" branch fires deterministically every time the e2e runs.
# We avoid future dates because the fixture is static YAML and no future
# date stays inside the 30-day warning window forever.
#
# The certificate body itself is a placeholder (the analyzer does not parse
# it; it reads the annotation only, per the privacy contract in CLAUDE.md).
# tls.crt / tls.key are minimal placeholders; Kubernetes accepts any bytes
# for `kubernetes.io/tls` as long as both keys are present.
apiVersion: v1
kind: Secret
metadata:
  name: ingress-tls
  namespace: secrets-bundle
  annotations:
    cert-manager.io/not-after: "2024-01-01T00:00:00Z"
    cert-manager.io/issuer-name: placeholder-issuer
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    placeholder
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    placeholder
    -----END PRIVATE KEY-----
---
# ConfigMap heuristics fixture: high-confidence credential keys (password,
# token, aws_secret_access_key, dsn, client_secret) so KUBE-CONFIGMAP-CREDS-001
# fires per (ConfigMap, key) pair. Values are arbitrary placeholders; the
# analyzer never reads them.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-credentials
  namespace: secrets-bundle
data:
  db_password: redacted-by-analyzer
  jwt_token: redacted-by-analyzer
  aws_secret_access_key: redacted-by-analyzer
  oauth_client_secret: redacted-by-analyzer
  database_dsn: redacted-by-analyzer
  username: not-a-credential
  feature_flag: not-a-credential
