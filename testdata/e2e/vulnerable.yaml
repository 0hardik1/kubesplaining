# Namespace-scoped RoleBinding: regression guard for issue #48. Granting
# `create rolebindings` via a RoleBinding only confers namespace-admin in
# `rbac-ns-fixtures`, NOT cluster-admin. The e2e script asserts that
# KUBE-PRIVESC-PATH-CLUSTER-ADMIN is NOT emitted for sa-ns-rolebinding-mutate.
apiVersion: v1
kind: Namespace
metadata:
  name: rbac-ns-fixtures
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-ns-rolebinding-mutate
  namespace: rbac-ns-fixtures
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: r-ns-rolebinding-mutate
  namespace: rbac-ns-fixtures
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-ns-rolebinding-mutate
  namespace: rbac-ns-fixtures
subjects:
  - kind: ServiceAccount
    name: sa-ns-rolebinding-mutate
    namespace: rbac-ns-fixtures
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: r-ns-rolebinding-mutate
---
# === MODULE: podsec / escape (extra fixtures in `vulnerable` namespace) ===
apiVersion: apps/v1
kind: Deployment
metadata:
  name: host-ns-app
  namespace: vulnerable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: host-ns-app
  template:
    metadata:
      labels:
        app: host-ns-app
    spec:
      hostPID: true
      hostIPC: true
      containers:
        - name: app
          image: nginx:1.27
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socket-mounts-app
  namespace: vulnerable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: socket-mounts-app
  template:
    metadata:
      labels:
        app: socket-mounts-app
    spec:
      containers:
        - name: app
          image: busybox:1.37
          command: ["sleep", "infinity"]
          # mountPaths use /hostmounts/* so the host bind-mounts never collide with
          # the container image's own /var/* tree. The analyzer keys on hostPath.path
          # (the source), not mountPath, so KUBE-ESCAPE-005 / -008 / CONTAINERD-SOCKET-001
          # still fire from the source paths below.
          volumeMounts:
            - name: docker-sock
              mountPath: /hostmounts/docker.sock
            - name: containerd-sock
              mountPath: /hostmounts/containerd.sock
            - name: var-log
              mountPath: /hostmounts/var-log
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
        - name: containerd-sock
          hostPath:
            path: /var/run/containerd/containerd.sock
        - name: var-log
          hostPath:
            path: /var/log
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: generic-hostpath-app
  namespace: vulnerable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: generic-hostpath-app
  template:
    metadata:
      labels:
        app: generic-hostpath-app
    spec:
      containers:
        - name: app
          image: nginx:1.27
          volumeMounts:
            - name: tmp-data
              mountPath: /tmp/data
      volumes:
        - name: tmp-data
          hostPath:
            path: /tmp/data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: root-runner
  namespace: vulnerable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: root-runner
  template:
    metadata:
      labels:
        app: root-runner
    spec:
      containers:
        - name: app
          image: nginx:1.27
          securityContext:
            runAsUser: 0
---
