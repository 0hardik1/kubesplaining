name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # If CHANGELOG.md has a `## [VERSION]` section that matches the tag,
      # we feed that section to GoReleaser via --release-notes. Otherwise
      # GoReleaser falls back to its commit-grouping autogen (configured in
      # .goreleaser.yaml under `changelog`). This keeps the v1.0.0 launch
      # narrative hand-curated while letting v1.0.x patches autogen.
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -eu
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## \[/ { flag=0 }
            flag { print }
          ' CHANGELOG.md > "$NOTES_FILE" || true
          if [ -s "$NOTES_FILE" ]; then
            echo "Found release notes section for ${VERSION}:"
            head -5 "$NOTES_FILE"
            echo "notes-file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "No CHANGELOG section for ${VERSION}; falling back to autogen."
          fi

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: >-
            release --clean
            ${{ steps.notes.outputs.notes-file && format('--release-notes {0}', steps.notes.outputs.notes-file) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
